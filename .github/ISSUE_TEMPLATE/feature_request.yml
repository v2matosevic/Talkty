name: Feature request
description: Suggest an idea or improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do that Talkty makes hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: Your idea
      description: How would you like it to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered
    validations:
      required: false
