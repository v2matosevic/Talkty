<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="talkty.css">
<style>
html,body{width:100vw;height:100vh;overflow:hidden;background:#08080a}
.stage{position:relative;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center}
.bg{position:absolute;inset:0;background:radial-gradient(130% 95% at 50% -20%, #1b1b21 0%, #0d0d10 50%, #08080a 100%)}
.grid{position:absolute;inset:0;opacity:.3;
  background-image:radial-gradient(rgba(255,255,255,.05) 1px, transparent 1.4px);background-size:34px 34px;
  mask-image:radial-gradient(75% 75% at 50% 44%, #000 0%, transparent 80%);
  -webkit-mask-image:radial-gradient(75% 75% at 50% 44%, #000 0%, transparent 80%);}
.col{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center}
.pillwrap{margin-bottom:7vh}
.word{font-size:13vh;font-weight:650;letter-spacing:-.022em;color:var(--zinc50);line-height:1}
.tag{margin-top:4.6vh;font-size:4.4vh;font-weight:400;color:var(--zinc400)}
.meta{margin-top:5vh;display:flex;align-items:center;gap:2.4vh;font-size:2.9vh;color:var(--zinc500)}
.meta .dot{width:1.7vh;height:1.7vh;border-radius:50%;background:var(--bar-record);box-shadow:0 0 14px rgba(255,107,107,.55)}
.meta .sep{width:.7vh;height:.7vh;border-radius:50%;background:var(--zinc700)}
</style></head>
<body>
<div class="stage">
  <div class="bg"></div><div class="grid"></div>
  <div class="col">
    <div class="pillwrap">
      <div class="pill" style="--s:3.4">
        <span class="bars"><i></i><i></i><i></i></span>
        <span class="time">0:07</span>
        <svg class="spark" viewBox="0 0 18 16"><path d="M9,0.5 L10.5,6.6 L16.5,8 L10.5,9.4 L9,15.5 L7.5,9.4 L1.5,8 L7.5,6.6 Z"/></svg>
      </div>
    </div>
    <div class="word">Talkty</div>
    <div class="tag">Local speech to text. Press a key, talk, paste.</div>
    <div class="meta">
      <span class="dot"></span><span>Free and open source</span>
      <span class="sep"></span><span>Runs on your device</span>
      <span class="sep"></span><span>Windows &amp; macOS</span>
    </div>
  </div>
</div>
</body></html>
