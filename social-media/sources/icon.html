<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="talkty.css">
<style>
html,body{width:1024px;height:1024px;overflow:hidden;background:transparent}
.stage{width:1024px;height:1024px;display:flex;align-items:center;justify-content:center}
.tile{width:1024px;height:1024px;border-radius:232px;position:relative;
  background:linear-gradient(155deg,#202027 0%,#141417 46%,#0e0e11 100%);
  border:6px solid rgba(255,255,255,.07);
  box-shadow:inset 0 4px 30px rgba(255,255,255,.05), inset 0 -10px 40px rgba(0,0,0,.5);
  display:flex;align-items:center;justify-content:center}
.tile::after{content:"";position:absolute;inset:0;border-radius:232px;
  background:radial-gradient(80% 60% at 50% 22%, rgba(255,255,255,.06), transparent 60%)}
.bars{display:flex;align-items:center;gap:46px;height:420px;z-index:2}
.bars i{display:block;width:90px;border-radius:45px;background:var(--bar-record);
  box-shadow:0 18px 60px rgba(255,107,107,.35)}
.bars i:nth-child(1){height:210px}
.bars i:nth-child(2){height:420px}
.bars i:nth-child(3){height:290px}
</style></head>
<body>
<div class="stage">
  <div class="tile"><div class="bars"><i></i><i></i><i></i></div></div>
</div>
</body></html>
