<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="talkty.css">
<style>
html,body{width:2000px;height:620px;overflow:hidden;background:#08080a}
.stage{position:relative;width:2000px;height:620px}
.bg{position:absolute;inset:0;background:radial-gradient(120% 130% at 50% 0%, #17171c 0%, #0c0c0f 55%, #08080a 100%)}
.row{position:relative;z-index:2;height:100%;display:grid;grid-template-columns:repeat(4,1fr)}
.cell{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:40px}
.cell .label{font-size:24px;color:var(--zinc500);letter-spacing:.04em;text-transform:uppercase}
.cell + .cell{border-left:1px solid rgba(255,255,255,.05)}
.pill .time.dots{letter-spacing:.08em}
</style></head>
<body>
<div class="stage"><div class="bg"></div>
  <div class="row">
    <div class="cell">
      <div class="pill" style="--s:2.6"><span class="bars"><i></i><i></i><i></i></span><span class="time">0:07</span></div>
      <div class="label">Recording</div>
    </div>
    <div class="cell">
      <div class="pill transcribe" style="--s:2.6"><span class="bars"><i></i><i></i><i></i></span><span class="time dots">...</span></div>
      <div class="label">Transcribing</div>
    </div>
    <div class="cell">
      <div class="pill copied" style="--s:2.6"><span class="bars"><i></i><i></i><i></i></span><span class="time">Copied</span></div>
      <div class="label">Copied</div>
    </div>
    <div class="cell">
      <div class="pill prompt" style="--s:2.6"><span class="bars"><i></i><i></i><i></i></span><span class="time">0:07</span>
        <svg class="spark" viewBox="0 0 18 16"><path d="M9,0.5 L10.5,6.6 L16.5,8 L10.5,9.4 L9,15.5 L7.5,9.4 L1.5,8 L7.5,6.6 Z"/></svg></div>
      <div class="label">Prompting</div>
    </div>
  </div>
</div>
</body></html>
