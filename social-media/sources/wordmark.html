<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="talkty.css">
<style>
html,body{width:1400px;height:420px;overflow:hidden;background:transparent}
.stage{width:1400px;height:420px;display:flex;align-items:center;justify-content:center;gap:40px}
.mark{display:flex;align-items:center;gap:11px;height:120px}
.mark i{display:block;width:22px;border-radius:11px;background:var(--bar-record)}
.mark i:nth-child(1){height:54px}
.mark i:nth-child(2){height:104px}
.mark i:nth-child(3){height:72px}
.word{font-size:160px;font-weight:650;letter-spacing:-.025em;color:var(--zinc50);line-height:1}
</style></head>
<body>
<div class="stage">
  <div class="mark"><i></i><i></i><i></i></div>
  <div class="word">Talkty</div>
</div>
</body></html>
